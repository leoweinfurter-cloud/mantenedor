<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mantenedor — Acesso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050d1a;
  --card:#0d1929;
  --border:#1e3a5f;
  --text:#e2e8f0;
  --muted:#64748b;
  --blue:#3b82f6;
  --blue-light:#60a5fa;
  --green:#4ade80;
  --error:#f87171;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px;overflow-y:auto;}

/* Background grid */
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(59,130,246,.12),transparent);pointer-events:none;}

/* Logo */
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;z-index:1;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#1d4ed8,#7c3aed);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 30px rgba(59,130,246,.3);}
.logo-text{font-size:26px;font-weight:800;letter-spacing:-.5px;}
.logo-text span{color:var(--blue-light);}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px 28px;width:100%;max-width:420px;z-index:1;box-shadow:0 24px 60px rgba(0,0,0,.5);}

/* Tabs */
.tabs{display:flex;background:#060b12;border-radius:10px;padding:3px;gap:3px;margin-bottom:28px;}
.tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:all .15s;}
.tab.active{background:var(--card);color:var(--blue-light);}

/* Form */
.field{margin-bottom:16px;}
.label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;display:block;}
input{width:100%;background:#060b12;border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
input:focus{border-color:var(--blue);}
input::placeholder{color:#334155;}
.hint{font-size:11px;color:var(--muted);margin-top:5px;}

/* Button */
.btn-primary{width:100%;background:linear-gradient(135deg,#1d4ed8,#3b82f6);border:none;border-radius:10px;padding:14px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;margin-top:8px;position:relative;overflow:hidden;}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(59,130,246,.3);}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-primary .spinner{display:none;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
.btn-primary.loading span{display:none;}
.btn-primary.loading .spinner{display:block;}

/* Messages */
.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);color:var(--error);}
.msg.success{background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);}
.msg.show{display:block;}

/* Divider */
.divider{text-align:center;color:var(--muted);font-size:12px;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}

/* Footer */
.footer{margin-top:24px;margin-bottom:24px;text-align:center;font-size:12px;color:var(--muted);z-index:1;}
.footer a{color:var(--blue-light);text-decoration:none;}

@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.card{animation:fadeIn .3s ease;}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;width:100%;min-height:calc(100vh - 80px);justify-content:center;padding:20px 0"><div class="logo">
  <div class="logo-icon">⚙</div>
  <div class="logo-text">Manten<span>edor</span></div>
</div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="setTab('login')" id="tab-login">Entrar</div>
    <div class="tab" onclick="setTab('signup')" id="tab-signup">Criar Conta</div>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="field">
      <label class="label">E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label class="label">Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">
      <span>Entrar</span>
      <div class="spinner"></div>
    </button>
  </div>

  <!-- SIGNUP -->
  <div id="form-signup" style="display:none">
    <div class="field">
      <label class="label">Seu Nome</label>
      <input type="text" id="signup-nome" placeholder="Nome completo"/>
    </div>
    <div class="field">
      <label class="label">Nome da Empresa</label>
      <input type="text" id="signup-empresa" placeholder="Ex: Metalúrgica São Paulo"/>
      <div class="hint">Será o nome da sua conta no Mantenedor</div>
    </div>
    <div class="field">
      <label class="label">E-mail</label>
      <input type="email" id="signup-email" placeholder="seu@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label class="label">Senha</label>
      <input type="password" id="signup-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <button class="btn-primary" id="btn-signup" onclick="doSignup()">
      <span>Criar Conta Grátis</span>
      <div class="spinner"></div>
    </button>
    <div class="divider">plano gratuito inclui</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;color:#475569">
      <div>✓ Ativos ilimitados</div>
      <div>✓ OS ilimitadas</div>
      <div>✓ Planos de manutenção</div>
      <div>✓ Relatórios</div>
    </div>
  </div>

  <!-- ACEITAR CONVITE -->
  <div id="form-convite" style="display:none">
    <div class="hint" style="margin-bottom:16px" id="convite-desc">Carregando convite...</div>
    <div class="field">
      <label class="label">E-mail</label>
      <input type="email" id="convite-email" disabled/>
    </div>
    <div class="field">
      <label class="label">Crie uma senha</label>
      <input type="password" id="convite-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label class="label">Confirme a senha</label>
      <input type="password" id="convite-senha2" placeholder="Repita a senha" autocomplete="new-password"/>
    </div>
    <button class="btn-primary" id="btn-convite" onclick="doAceitarConvite()">
      <span>Entrar</span>
      <div class="spinner"></div>
    </button>
  </div>
</div></div>

<div class="footer">
  Mantenedor &copy; 2026 &bull; <a href="#">Termos</a> &bull; <a href="#">Privacidade</a>
</div>

<script>
var SB_URL  = "https://mtmcrpigiwsxfwxkqdkz.supabase.co";
var SB_KEY  = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im10bWNycGlnaXdzeGZ3eGtxZGt6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTYxNTYsImV4cCI6MjA5NTkzMjE1Nn0.U3_-Fh35p-l3ZYSApbmn-7KRLlF1voZWS5Pbm0_LQ7A";
var REST    = SB_URL + "/rest/v1";
var AUTH    = SB_URL + "/auth/v1";

// Check if already logged in
(function(){
  var s = localStorage.getItem("mx_session");
  if(s){
    try{ var sess=JSON.parse(s); if(sess.access_token) window.location.href="dashboard.html"; }
    catch(e){}
  }
})();

// Mensagem quando o app forçou logout por sessão sem empresa associada
(function(){
  var params=new URLSearchParams(window.location.search);
  if(params.get("erro")==="sem_tenant"){
    window.addEventListener("DOMContentLoaded",function(){
      showMsg("Sua sessão expirou ou ficou sem empresa associada. Faça login novamente.","error");
    });
  }
})();

// ── ACEITAR CONVITE ──────────────────────────────────────────────────
var CONVITE_TOKEN = new URLSearchParams(window.location.search).get("convite");
var CONVITE_DATA = null;

if(CONVITE_TOKEN){
  window.addEventListener("DOMContentLoaded", function(){
    document.querySelector(".tabs").style.display = "none";
    document.getElementById("form-login").style.display  = "none";
    document.getElementById("form-signup").style.display = "none";
    document.getElementById("form-convite").style.display = "block";
    setLoading("btn-convite", true);

    fetch(REST+"/rpc/get_convite_by_token", {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"},
      body: JSON.stringify({p_token: CONVITE_TOKEN})
    }).then(function(r){return r.json();}).then(function(rows){
      var c = Array.isArray(rows) ? rows[0] : rows;
      setLoading("btn-convite", false);
      if(!c || c.status!=="pendente" || new Date(c.expires_at) < new Date()){
        document.getElementById("convite-desc").textContent = "Este link de convite é inválido ou já expirou. Peça um novo link pra quem te convidou.";
        document.getElementById("btn-convite").disabled = true;
        return;
      }
      CONVITE_DATA = c;
      document.getElementById("convite-desc").textContent =
        "Você foi convidado por "+(c.tenant_nome||"sua empresa")+" como "+c.perfil+". Crie sua senha pra entrar.";
      document.getElementById("convite-email").value = c.email;
    }).catch(function(){
      setLoading("btn-convite", false);
      document.getElementById("convite-desc").textContent = "Erro ao carregar o convite. Verifique sua conexão e recarregue a página.";
    });
  });
}

function doAceitarConvite(){
  if(!CONVITE_DATA){ showMsg("Convite ainda não carregado.","error"); return; }
  var senha  = document.getElementById("convite-senha").value;
  var senha2 = document.getElementById("convite-senha2").value;
  if(senha.length<6){ showMsg("Senha deve ter ao menos 6 caracteres.","error"); return; }
  if(senha!==senha2){ showMsg("As senhas não coincidem.","error"); return; }

  setLoading("btn-convite", true); hideMsg();

  fetch(AUTH+"/signup", {
    method:"POST",
    headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
    body: JSON.stringify({email: CONVITE_DATA.email, password: senha})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error||d.error_code){
      showMsg(d.msg||d.error_description||"Erro ao criar acesso.","error");
      setLoading("btn-convite", false); return;
    }
    var userId = d.user ? d.user.id : d.id;
    var token  = d.access_token || (d.session && d.session.access_token);
    if(!token){
      // E-mail confirmação pode estar ativa e não retornar sessão direto — orienta o usuário
      showMsg("Conta criada. Confirme seu e-mail e depois faça login normalmente.","success");
      setLoading("btn-convite", false); return;
    }

    fetch(REST+"/rpc/aceitar_convite", {
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body: JSON.stringify({p_token: CONVITE_TOKEN, p_user_id: userId})
    }).then(function(r){return r.json();}).then(function(rows){
      var res = Array.isArray(rows) ? rows[0] : rows;
      if(!res){
        showMsg("Não foi possível vincular o convite. Tente novamente.","error");
        setLoading("btn-convite", false); return;
      }
      localStorage.setItem("mx_session", JSON.stringify({
        access_token: token,
        refresh_token: d.refresh_token || (d.session && d.session.refresh_token) || "",
        user_id: userId, email: CONVITE_DATA.email,
        tenant_id: res.tenant_id, perfil: res.perfil,
        nome: res.nome, plano: res.plano || "free", tenantNome: res.tenant_nome || ""
      }));
      showMsg("Conta criada! Redirecionando...","success");
      setTimeout(function(){ window.location.href="dashboard.html"; }, 1000);
    }).catch(function(){
      showMsg("Erro ao vincular o convite. Sua conta foi criada — tente fazer login normalmente.","error");
      setLoading("btn-convite", false);
    });
  }).catch(function(){
    showMsg("Erro de conexão. Tente novamente.","error");
    setLoading("btn-convite", false);
  });
}

function setTab(t){
  document.getElementById("form-login").style.display  = t==="login"  ? "block":"none";
  document.getElementById("form-signup").style.display = t==="signup" ? "block":"none";
  document.getElementById("tab-login").classList.toggle("active",  t==="login");
  document.getElementById("tab-signup").classList.toggle("active", t==="signup");
  hideMsg();
}

function showMsg(text,type){
  var el=document.getElementById("msg");
  el.textContent=text; el.className="msg "+type+" show";
}
function hideMsg(){
  var el=document.getElementById("msg");
  el.className="msg";
}
function setLoading(btnId, on){
  var btn=document.getElementById(btnId);
  btn.classList.toggle("loading",on);
  btn.disabled=on;
}

// ── LOGIN ─────────────────────────────────────────────────────────────
function doLogin(){
  var email=document.getElementById("login-email").value.trim();
  var senha=document.getElementById("login-senha").value;
  if(!email||!senha){showMsg("Preencha e-mail e senha.","error");return;}
  setLoading("btn-login",true); hideMsg();
  fetch(AUTH+"/token?grant_type=password",{
    method:"POST",
    headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({email:email,password:senha})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error||d.error_code){
      showMsg("E-mail ou senha incorretos.","error");
      setLoading("btn-login",false);return;
    }
    // Save session
    localStorage.setItem("mx_session",JSON.stringify({
      access_token:d.access_token,
      refresh_token:d.refresh_token,
      user_id:d.user.id,
      email:d.user.email
    }));
    // Load tenant info
    loadTenantInfo(d.access_token,d.user.id);
  }).catch(function(){
    showMsg("Erro de conexão. Tente novamente.","error");
    setLoading("btn-login",false);
  });
}

function loadTenantInfo(token, userId){
  fetch(REST+"/user_tenants?user_id=eq."+userId+"&select=tenant_id,perfil,nome",{
    headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token}
  }).then(function(r){return r.json();}).then(function(rows){
    if(!rows||!rows.length){
      showMsg("Conta não encontrada. Crie uma conta.","error");
      setLoading("btn-login",false);return;
    }
    var ut=rows[0];
    // Get tenant details
    fetch(REST+"/tenants?id=eq."+ut.tenant_id+"&select=id,nome,plano",{
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token}
    }).then(function(r){return r.json();}).then(function(tenants){
      var tenant=tenants[0]||{};
      var sess=JSON.parse(localStorage.getItem("mx_session"));
      sess.tenant_id  = ut.tenant_id;
      sess.perfil     = ut.perfil;
      sess.nome       = ut.nome||sess.email;
      sess.plano      = tenant.plano||"free";
      sess.tenantNome = tenant.nome||"";
      localStorage.setItem("mx_session",JSON.stringify(sess));
      window.location.href="dashboard.html";
    });
  }).catch(function(){
    showMsg("Erro ao carregar dados. Tente novamente.","error");
    setLoading("btn-login",false);
  });
}

// ── SIGNUP ────────────────────────────────────────────────────────────
function doSignup(){
  var nome    = document.getElementById("signup-nome").value.trim();
  var empresa = document.getElementById("signup-empresa").value.trim();
  var email   = document.getElementById("signup-email").value.trim();
  var senha   = document.getElementById("signup-senha").value;
  if(!nome||!empresa||!email||!senha){showMsg("Preencha todos os campos.","error");return;}
  if(senha.length<6){showMsg("Senha deve ter ao menos 6 caracteres.","error");return;}
  setLoading("btn-signup",true); hideMsg();

  // 1. Create auth user
  fetch(AUTH+"/signup",{
    method:"POST",
    headers:{"apikey":SB_KEY,"Content-Type":"application/json"},
    body:JSON.stringify({email:email,password:senha})
  }).then(function(r){return r.json();}).then(function(d){
    if(d.error||d.error_code){
      showMsg(d.msg||d.error_description||"Erro ao criar conta.","error");
      setLoading("btn-signup",false);return;
    }

    var userId = d.user ? d.user.id : d.id;
    var token  = d.access_token || (d.session && d.session.access_token) || SB_KEY;

    // 2. Create tenant
    fetch(REST+"/tenants",{
      method:"POST",
      headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,
               "Content-Type":"application/json","Prefer":"return=representation"},
      body:JSON.stringify({nome:empresa,email:email,plano:"free"})
    }).then(function(r){return r.json();}).then(function(tenantRows){
      var tenant = Array.isArray(tenantRows)?tenantRows[0]:tenantRows;

      // 3. Link user to tenant
      fetch(REST+"/user_tenants",{
        method:"POST",
        headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,
                 "Content-Type":"application/json"},
        body:JSON.stringify({user_id:userId,tenant_id:tenant.id,perfil:"Coordenador",nome:nome})
      }).then(function(){
        // 4. Create default categories for this tenant
        var CATS=[
          {id:1,nome:"Pneumatico",descricao:"Compressores, valvulas",icone:"💨",cor:"#60a5fa",tenant_id:tenant.id},
          {id:2,nome:"Hidraulico",descricao:"Bombas, cilindros",icone:"💧",cor:"#3b82f6",tenant_id:tenant.id},
          {id:3,nome:"Eletrico",descricao:"Motores, paineis",icone:"⚡",cor:"#fbbf24",tenant_id:tenant.id},
          {id:4,nome:"Mecanico",descricao:"Redutores, rolamentos",icone:"⚙",cor:"#f87171",tenant_id:tenant.id},
          {id:5,nome:"Transporte",descricao:"Esteiras, elevadores",icone:"🚛",cor:"#a78bfa",tenant_id:tenant.id},
          {id:6,nome:"Utilidades",descricao:"HVAC, caldeiras",icone:"🌿",cor:"#34d399",tenant_id:tenant.id},
          {id:7,nome:"Instrumentacao",descricao:"Sensores, transmissores",icone:"📡",cor:"#f59e0b",tenant_id:tenant.id},
          {id:8,nome:"Outros",descricao:"Nao categorizados",icone:"🔧",cor:"#9ca3af",tenant_id:tenant.id}
        ];
        fetch(REST+"/categorias",{
          method:"POST",
          headers:{"apikey":SB_KEY,"Authorization":"Bearer "+token,
                   "Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
          body:JSON.stringify(CATS)
        }).then(function(){
          // Save session
          localStorage.setItem("mx_session",JSON.stringify({
            access_token: d.access_token||(d.session&&d.session.access_token)||"",
            refresh_token: d.refresh_token||(d.session&&d.session.refresh_token)||"",
            user_id: userId, email: email,
            tenant_id: tenant.id, perfil:"Coordenador",
            nome: nome, plano:"free", tenantNome:empresa
          }));
          showMsg("Conta criada! Redirecionando...","success");
          setTimeout(function(){window.location.href="dashboard.html";},1200);
        });
      });
    });
  }).catch(function(e){
    showMsg("Erro de conexão. Tente novamente.","error");
    setLoading("btn-signup",false);
  });
}

// Enter key support
document.addEventListener("keydown",function(e){
  if(e.key!=="Enter")return;
  if(CONVITE_TOKEN){ doAceitarConvite(); return; }
  var loginVisible=document.getElementById("form-login").style.display!=="none";
  if(loginVisible)doLogin(); else doSignup();
});
</script>
</body>
</html>
