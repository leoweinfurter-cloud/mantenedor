</nav>
  </div>
  <div id="main">
    <div id="topbar">
      <div id="topbar-left">
        <a class="topbar-logo" href="index.html">&#9881;</a>
        <div><div id="tt" data-i18n="nav_ordens">Ordens de Servico</div><div id="ta"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <select id="perfil-sel" onchange="PERFIL_ATIVO=this.value;render()" style="background:#1e3a5f;border:1px solid #2d5a8e;border-radius:8px;padding:6px 10px;font-size:12px;color:#e2e8f0;width:auto">
          <option value="Coordenador">&#128101; Coordenador</option>
        </select>
      </div>

  <div class="ad-banner" id="ad-top"><!-- Anuncio MaintenX Free --></div>

<script src="_lang.js"></script>

<script>
// ═══════════════════════════════════════════════════════════════════════
// ordens.html — HUB: resumo geral + lista unificada de O.S.
// A criacao e execucao de cada O.S. acontece em arquivo dedicado por tipo:
//   ordens-corretiva.html   → OS Corretiva
//   ordens-programada.html  → OS Preventiva / Preditiva (vinculada a plano)
// ═══════════════════════════════════════════════════════════════════════
var D=loadData(), ordens=D.ordens, ativos=D.ativos;
var filter="Todas";

var _tecNomes=[];
ordens.forEach(function(o){if(o.tecnico&&_tecNomes.indexOf(o.tecnico)===-1)_tecNomes.push(o.tecnico);});
var PERFIL_ATIVO = "Coordenador";

function setCoordenador(){PERFIL_ATIVO="Coordenador";document.getElementById("perfil-sel").value="Coordenador";render();}
function setPerfilTecnico(nome){PERFIL_ATIVO=nome;render();}
function isCoordenador(){ return PERFIL_ATIVO==="Coordenador"; }
function meuNomeAtivo(){ return PERFIL_ATIVO; }
function setFilter(f){filter=f;render();}
function selOS(id){
  var o=ordens.find(function(x){return x.id==id;});
  if(o) window.location.href=ordensDetailUrl(o);
}
function irNovaCorretiva(){window.location.href="ordens-corretiva.html?new=1";}
function irNovaProgramada(){window.location.href="ordens-programada.html?new=1";}
function gerarOSDialog(){
  var novas = gerarOSProgramadas(7);
  ordens = loadData().ordens;
  if(novas.length === 0){
    alert("Nenhum plano vencido ou com vencimento em 7 dias. Verifique os planos na ficha dos ativos.");
  } else {
    alert(novas.length + " OS gerada(s) com sucesso! Numeracao: "+novas.map(function(n){return n.numero_os;}).join(", "));
  }
  render();
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render(){
  if(backfillNumerosOS(ordens)){saveOrdens(ordens);}
  var k={criticas:ordens.filter(function(o){return o.prioridade=="Critica"&&o.status!="Concluida"&&o.status!="Cancelada";}).length};
  var al=document.getElementById("ta");
  if(k.criticas>0){al.style.display="block";al.textContent=k.criticas+t('topbar_alert_criticas');}else{al.style.display="none";}
  document.getElementById("ct").innerHTML=renderList();
}

function renderList(){
  var counts={a:ordens.filter(function(o){return o.status=="Aberta";}).length,e:ordens.filter(function(o){return o.status=="Em Andamento";}).length,c:ordens.filter(function(o){return o.status=="Concluida";}).length};
  var tipoCounts={cor:ordens.filter(isOSCorretiva).length,prog:ordens.filter(isOSProgramada).length};
  var summary='<div style="display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap">'
    +'<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:#fbbf24">'+counts.a+'</div><div style="font-size:11px;color:#64748b">Abertas</div></div>'
    +'<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:#60a5fa">'+counts.e+'</div><div style="font-size:11px;color:#64748b">Andamento</div></div>'
    +'<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:#4ade80">'+counts.c+'</div><div style="font-size:11px;color:#64748b">Concluidas</div></div>'
    +'<div style="text-align:center;border-left:1px solid #1e3a5f;padding-left:20px"><div style="font-size:26px;font-weight:800;color:#f87171">'+tipoCounts.cor+'</div><div style="font-size:11px;color:#64748b">Corretivas</div></div>'
    +'<div style="text-align:center"><div style="font-size:26px;font-weight:800;color:#8b5cf6">'+tipoCounts.prog+'</div><div style="font-size:11px;color:#64748b">Prev./Predit.</div></div>'
    +'</div>';
  var fb=[t('ord_filtro_todas'),t('ord_status_aberta'),t('ord_status_and'),t('ord_status_conc'),t('ord_status_canc')].map(function(x){return'<button class="btn bsm '+(filter==x?"bp":"bx")+'" onclick="setFilter(\''+x+'\')">'+x+'</button>';}).join("");
  var list=ordens.filter(function(o){return filter=="Todas"||o.status==filter;});
  var typeColors={[t('ord_tipo_corr')]:"#f87171",[t('ord_tipo_prev')]:"#4ade80",[t('ord_tipo_pred')]:"#8b5cf6","Mista":"#60a5fa"};
  var cards=list.length==0?'<div style="color:#64748b;text-align:center;padding:40px;font-size:14px">Nenhuma OS encontrada</div>'
    :list.map(function(o){
      var logCount=(o.execLog&&o.execLog.length)||0;
      var tc=typeColors[o.tipo]||"#60a5fa";
      return'<div class="os-card" onclick="selOS('+o.id+')">'
        +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
        +'<span style="width:8px;height:8px;border-radius:50%;background:'+tc+';flex-shrink:0;display:inline-block"></span>'
        +'<span style="font-size:10px;font-weight:700;color:'+tc+';text-transform:uppercase;letter-spacing:.05em">'+esc(o.tipo)+'</span>'
        +'<span class="os-numero">'+esc(o.numero_os||"")+'</span>'
        +'<span style="flex:1"></span>'
        +bdg(o.status,SC)
        +'</div>'
        +'<div class="os-card-title" style="margin-bottom:6px">'+esc(o.titulo)+'</div>'
        +'<div class="os-card-meta">'
        +'<span style="color:#94a3b8">'+esc(o.ativo)+'</span>'
        +(o.tecnico?'<span>&#128100; '+esc(o.tecnico)+'</span>':'')
        +(o.prazo?'<span>&#128197; '+esc(o.prazo)+'</span>':'')
        +(logCount>0?'<span style="color:#818cf8">&#128203; '+logCount+' registros</span>':'')
        +'</div>'
        +'<div style="margin-top:8px;display:flex;align-items:center;justify-content:space-between">'
        +bdg(o.prioridade,PC)
        +'</div>'
        +'</div>';
    }).join("");
  var acoes=isCoordenador()?'<div class="os-hub-split">'
      +'<button class="btn bx bsm" onclick="gerarOSDialog()" style="font-size:11px">&#9654; Gerar OS Programadas</button>'
      +'<button class="btn bx" onclick="irNovaProgramada()">+ Nova Prev./Predit.</button>'
      +'<button class="btn bp" onclick="irNovaCorretiva()">+ Nova OS Corretiva</button>'
      +'</div>':'';
  return summary+'<div class="fr"><div class="fb">'+fb+'</div>'+acoes+'</div>'+cards;
}

// Popula seletor de perfil
(function(){
  var sel = document.getElementById("perfil-sel");
  _tecNomes.forEach(function(nome){
    var opt = document.createElement("option");
    opt.value = nome;
    opt.textContent = "⚒ " + nome;
    sel.appendChild(opt);
  });
})();

// Deep link vindo do calendario — encaminha direto para o arquivo de execucao correto
(function(){
  var calOS = localStorage.getItem("mx_cal_os");
  if(!calOS) return;
  localStorage.removeItem("mx_cal_os");
  var calId = parseInt(calOS);
  var os = ordens.find(function(o){
    return o.id===calId || o.id===calOS || String(o.id)===calOS;
  });
  if(os){
    window.location.href=ordensDetailUrl(os);
  } else {
    console.warn("OS nao encontrada para id:", calOS, "ordens ids:", ordens.map(function(o){return o.id;}));
  }
})();

initApp(render);
</script>
<script>
window.addEventListener("langchange", function(){
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    el.textContent = t(el.getAttribute("data-i18n"));
  });
  render();
});
</script>
<script src="_theme.js"></script>
</body>
</html>
