<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MaintenX — OS Corretiva</title>
<link rel="stylesheet" href="_style.css" id="theme-link"/>
<style>
.exec-log-item{background:#060b12;border:1px solid #1e3a5f;border-radius:10px;padding:12px;margin-bottom:8px}
.exec-log-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.exec-log-tipo{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 8px;border-radius:10px}
.exec-log-date{font-size:11px;color:#64748b}
.exec-log-text{font-size:13px;color:#e2e8f0;line-height:1.5}
.exec-log-meta{font-size:11px;color:#64748b;margin-top:5px}
.status-flow{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto}
.status-step{flex:1;text-align:center;padding:10px 4px;font-size:11px;font-weight:700;color:#475569;border-bottom:2px solid #1e3a5f;white-space:nowrap;min-width:70px}
.status-step.done{color:#4ade80;border-color:#4ade80}
.status-step.current{color:#60a5fa;border-color:#60a5fa}
.os-type-btn{padding:12px 8px;border-radius:10px;border:1px solid #1e3a5f;background:#060b12;cursor:pointer;text-align:center;transition:all .15s;font-family:inherit}
.os-type-btn.selected{border-color:#3b82f6;background:rgba(59,130,246,.1)}
.os-type-icon{font-size:20px;margin-bottom:4px}
.os-type-label{font-size:11px;font-weight:700;color:#94a3b8}
.os-type-btn.selected .os-type-label{color:#60a5fa}
.os-numero{font-size:10px;font-weight:700;color:#64748b;letter-spacing:.03em}
.os-numero-big{font-size:12px;font-weight:700;color:#f87171;letter-spacing:.03em;margin-bottom:4px}

/* ── AD BANNER ── */
.ad-banner{display:none;background:var(--inner-bg,#060b12);border:1px solid var(--border,#1e3a5f);border-radius:10px;padding:10px;margin:0 0 12px;text-align:center;font-size:11px;color:#64748b;}
.ad-banner ins{display:block;}
</style>
</head>
<body>
<div id="app">
  <div id="main">
    <div id="topbar">
      <div id="topbar-left">
        <a class="topbar-logo" href="index.html">&#9881;</a>
        <div><div id="tt">OS Corretiva</div><div id="ta"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <select id="perfil-sel" onchange="PERFIL_ATIVO=this.value;render()" style="background:#1e3a5f;border:1px solid #2d5a8e;border-radius:8px;padding:6px 10px;font-size:12px;color:#e2e8f0;width:auto">
          <option value="Coordenador">&#128101; Coordenador</option>
        </select>
      </div>
    </div>

  <div class="ad-banner" id="ad-top"><!-- Anuncio MaintenX Free --></div>
    <div id="ct"></div>
  </div>
</div>
<nav id="bottom-nav">
  <a class="bn-item" href="dashboard.html"><span class="bn-icon">&#9672;</span><span class="bn-label" data-i18n="nav_dashboard">Dashboard</span></a>
  <a class="bn-item active" href="ordens.html"><span class="bn-icon">&#9874;</span><span class="bn-label" data-i18n="nav_os">OS</span></a>
  <a class="bn-item" href="ativos.html"><span class="bn-icon">&#11041;</span><span class="bn-label" data-i18n="nav_ativos_short">Ativos</span></a>
  <a class="bn-item" href="cadastros.html"><span class="bn-icon">&#9998;</span><span class="bn-label" data-i18n="nav_cadastros">Cadastros</span></a>
  <a class="bn-item" href="calendario.html"><span class="bn-icon">&#128197;</span><span class="bn-label">Cal.</span></a>
  <a class="bn-item" href="relatorios.html"><span class="bn-icon">&#128202;</span><span class="bn-label">Rel.</span></a>
</nav>


<script src="_lang.js"></script>
<script src="_shared.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════
// ordens-corretiva.html — Criacao e execucao de OS Corretiva.
// OS Preventiva/Preditiva vivem em ordens-programada.html.
// ═══════════════════════════════════════════════════════════════════════
var D=loadData(), ordens=D.ordens, ativos=D.ativos;
var fotoBase64=null;

var _tecNomes=[];
ordens.forEach(function(o){if(o.tecnico&&_tecNomes.indexOf(o.tecnico)===-1)_tecNomes.push(o.tecnico);});
var PERFIL_ATIVO = "Coordenador";

function setCoordenador(){PERFIL_ATIVO="Coordenador";document.getElementById("perfil-sel").value="Coordenador";render();}
function setPerfilTecnico(nome){PERFIL_ATIVO=nome;render();}
function isCoordenador(){ return PERFIL_ATIVO==="Coordenador"; }
function meuNomeAtivo(){ return PERFIL_ATIVO; }
var currentExecTipo="observacao";
var execFormOpen=false;

function setExecTipo(val,el){
  currentExecTipo=val;
  document.getElementById("exec-tipo").value=val;
  document.querySelectorAll("#exec-form-card .os-type-btn").forEach(function(b){b.classList.remove("selected");});
  el.classList.add("selected");
  document.getElementById("exec-obs-fields").style.display=val=="observacao"?"block":"none";
  document.getElementById("exec-med-fields").style.display=val=="medicao"?"block":"none";
  document.getElementById("exec-peca-fields").style.display=val=="peca"?"block":"none";
  document.getElementById("exec-foto-fields").style.display=val=="foto"?"block":"none";
}

function previewFoto(input){
  if(!input.files||!input.files[0])return;
  var r=new FileReader();
  r.onload=function(e){
    fotoBase64=e.target.result;
    var prev=document.getElementById("exec-foto-preview");
    prev.innerHTML='<img src="'+fotoBase64+'" style="max-width:100%;max-height:150px;border-radius:8px;margin-bottom:6px"/>';
  };
  r.readAsDataURL(input.files[0]);
}

function nowLocalStr(){
  var now=new Date();var pad=function(n){return String(n).padStart(2,"0");};
  return now.getFullYear()+"-"+pad(now.getMonth()+1)+"-"+pad(now.getDate())+"T"+pad(now.getHours())+":"+pad(now.getMinutes());
}

// ── URL STATE ─────────────────────────────────────────────────────────
function getParam(name){var m=new RegExp('[?&]'+name+'=([^&]*)').exec(location.search);return m?decodeURIComponent(m[1]):null;}
var osId=getParam('id')?parseInt(getParam('id')):null;
function currentSel(){return osId?ordens.find(function(o){return o.id==osId;}):null;}
function voltar(){window.location.href="ordens.html";}

// ── REGISTRAR EXECUCAO (formulario embutido na pagina) ──────────────────
function toggleExecForm(){
  execFormOpen=!execFormOpen;
  currentExecTipo="observacao";
  fotoBase64=null;
  render();
}

function saveExec(){
  var os=currentSel();
  if(!os) return;
  if(!os.execLog)os.execLog=[];
  var tipo=currentExecTipo;
  var entry={id:nextId(),tipo:tipo,data:document.getElementById("exec-data").value,tecnico:document.getElementById("exec-tec").value};
  if(tipo=="observacao"){
    var d=document.getElementById("exec-desc").value.trim();if(!d){alert("Informe a descricao.");return;}
    entry.desc=d;
  } else if(tipo=="medicao"){
    var val=parseFloat(document.getElementById("exec-valor").value);if(isNaN(val)){alert("Informe o valor medido.");return;}
    entry.param=document.getElementById("exec-param").value;entry.valor=val;entry.limite=parseFloat(document.getElementById("exec-limite").value)||0;entry.cond=document.getElementById("exec-cond").value;entry.obs=document.getElementById("exec-med-obs").value;
  } else if(tipo=="peca"){
    var d2=document.getElementById("exec-peca-desc").value.trim();if(!d2){alert("Informe a peca.");return;}
    entry.desc=d2;entry.qty=parseInt(document.getElementById("exec-qty").value)||1;entry.custo=parseFloat(document.getElementById("exec-custo").value)||0;entry.obs=document.getElementById("exec-peca-obs").value;
  } else if(tipo=="foto"){
    if(!fotoBase64){alert("Selecione uma imagem.");return;}
    entry.desc=document.getElementById("exec-foto-desc").value;entry.foto=fotoBase64;
  }
  os.execLog.unshift(entry);
  saveOrdens(ordens);
  execFormOpen=false;
  render();
}

// ── UPDATE STATUS ──────────────────────────────────────────────────────────
function updOS(id,status){
  ordens=ordens.map(function(o){return o.id==id?Object.assign({},o,{status:status}):o;});
  saveOrdens(ordens);
  render();
}

// Ao concluir uma OS Corretiva, grava um registro no historico do ativo
// (necessario porque updOS() sozinho so muda o status da OS — nao mexe em
// fichas/historico). Sem ativo_id (OS antiga criada antes dessa correcao,
// ou dado incompleto) a OS ainda e concluida normalmente, mas avisamos que
// o historico nao pode ser gravado por falta de vinculo com o ativo.
function concluirOSCorretiva(id){
  if(!confirm("Confirmar conclusao desta OS?")) return;
  var os=ordens.find(function(o){return o.id==id;});
  if(!os) return;
  var fichas=loadData().fichas;
  var entry=registrarHistoricoOS(os,fichas);
  if(entry){
    saveFichas(fichas);
  } else if(typeof mxToast==="function"){
    mxToast("OS concluída, mas sem vínculo com um ativo específico — não foi possível registrar no histórico.","warn");
  }
  updOS(id,"Concluida");
}

// ── RENDER ─────────────────────────────────────────────────────────────────
function render(){
  if(backfillNumerosOS(ordens)){saveOrdens(ordens);}
  var k={criticas:ordens.filter(isOSCorretiva).filter(function(o){return o.prioridade=="Critica"&&o.status!="Concluida"&&o.status!="Cancelada";}).length};
  var al=document.getElementById("ta");
  if(k.criticas>0){al.style.display="block";al.textContent=k.criticas+t('topbar_alert_criticas');}else{al.style.display="none";}

  var sel=currentSel();
  // A OS chega aqui "Aberta" apenas se o usuario navegou direto pra ca
  // (ex: clicando no corpo do card no hub, sem passar pelo botao "Executar").
  // Como esta pagina e so de execucao, ao abrir ja consideramos que a
  // execucao comecou — sem exigir um clique extra em "Iniciar Execucao".
  if(sel&&sel.status=="Aberta"&&(isCoordenador()||sel.tecnico===meuNomeAtivo())){
    ordens=ordens.map(function(o){return o.id==sel.id?Object.assign({},o,{status:"Em Andamento"}):o;});
    saveOrdens(ordens);
    sel=currentSel();
  }
  if(osId&&sel&&!isOSCorretiva(sel)){
    window.location.replace("ordens-programada.html?id="+sel.id);
    return;
  }
  if(osId&&!sel){
    document.getElementById("ct").innerHTML='<div style="color:#64748b;text-align:center;padding:40px;font-size:14px">OS nao encontrada. <a href="ordens.html" style="color:#60a5fa">Voltar as Ordens de Servico</a></div>';
    return;
  }
  if(sel){
    document.getElementById("ct").innerHTML=renderDetail(sel);
    return;
  }
  // Pagina e so de execucao — sem id nao ha nada pra mostrar.
  window.location.replace("ordens.html");
}

function renderDetail(o){
  var STATUS_ORDER=[t('ord_status_aberta'),t('ord_status_and'),t('ord_status_conc')];
  var si=STATUS_ORDER.indexOf(o.status);
  var flow=STATUS_ORDER.map(function(s,i){return'<div class="status-step'+(i<si?" done":i==si?" current":"")+'">'+(i<si?"&#10003; ":"")+s+'</div>';}).join('<div style="color:#1e3a5f;font-size:16px;flex-shrink:0">&#8250;</div>');

  var podeExecutar = isCoordenador() || o.tecnico===meuNomeAtivo();
  var ac="";
  if(o.status=="Em Andamento"&&podeExecutar){
    ac='<button class="btn bp bfw" onclick="toggleExecForm()" style="background:#7c3aed">'+(execFormOpen?'&#10005; Fechar Formulario':'+ Registrar Execucao')+'</button>'
      +'<button class="btn bsu bfw" onclick="concluirOSCorretiva('+o.id+')">&#10003; Concluir OS</button>';
  }
  if(o.status!="Concluida"&&o.status!="Cancelada"&&isCoordenador())
    ac+='<button class="btn bd bfw" onclick="updOS('+o.id+',\'Cancelada\')">&#10005; Cancelar</button>';
  if(o.status=="Concluida"||o.status=="Cancelada")
    ac='<div style="color:#64748b;text-align:center;padding:12px;font-size:13px">OS finalizada</div>';
  if(!podeExecutar&&o.status!="Concluida"&&o.status!="Cancelada")
    ac='<div style="font-size:13px;color:#64748b;text-align:center;padding:12px;border:1px solid #1e3a5f;border-radius:8px">OS atribuida a <b style=\"color:#94a3b8\">'+esc(o.tecnico||"--")+'</b></div>';

  var logHtml="";
  if(o.execLog&&o.execLog.length>0){
    var tipoColors={observacao:"#60a5fa",medicao:"#a78bfa",peca:"#f59e0b",foto:"#34d399"};
    var tipoNames={observacao:t('exec_tipo_obs'),medicao:t('exec_tipo_med'),peca:t('exec_tipo_peca'),foto:t('exec_tipo_foto')};
    logHtml=o.execLog.map(function(e){
      var col=tipoColors[e.tipo]||"#60a5fa";
      var body="";
      if(e.tipo=="observacao"){body='<div class="exec-log-text">'+esc(e.desc)+'</div>';}
      else if(e.tipo=="medicao"){
        var condCol=e.cond=="Normal"?"#4ade80":e.cond=="Atencao"?"#fbbf24":"#f87171";
        body='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'
          +'<div><div style="font-size:22px;font-weight:800;color:'+condCol+'">'+e.valor+'</div><div style="font-size:11px;color:#64748b">'+esc(e.param)+'</div></div>'
          +(e.limite?'<div><div style="font-size:14px;color:#475569">'+e.limite+'</div><div style="font-size:10px;color:#475569">Limite</div></div>':'')
          +'<span style="padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;background:'+condCol+'20;color:'+condCol+'">'+esc(e.cond)+'</span>'
          +'</div>'
          +(e.obs?'<div style="font-size:12px;color:#94a3b8;margin-top:5px">'+esc(e.obs)+'</div>':"");
      }
      else if(e.tipo=="peca"){
        body='<div class="exec-log-text">'+esc(e.desc)+'</div>'
          +'<div style="font-size:12px;color:#94a3b8;margin-top:4px">Qtd: '+e.qty+(e.custo?' &bull; R$ '+(e.qty*e.custo).toLocaleString("pt-BR"):'')+(e.obs?' &bull; '+esc(e.obs):'')+'</div>';
      }
      else if(e.tipo=="foto"){
        body=(e.foto?'<img src="'+e.foto+'" style="max-width:100%;border-radius:8px;margin-top:4px;max-height:200px"/>':'')
          +(e.desc?'<div style="font-size:12px;color:#94a3b8;margin-top:6px">'+esc(e.desc)+'</div>':"");
      }
      return'<div class="exec-log-item">'
        +'<div class="exec-log-header">'
        +'<span class="exec-log-tipo" style="background:'+col+'20;color:'+col+'">'+tipoNames[e.tipo]+'</span>'
        +'<span class="exec-log-date">'+(e.data||"")+(e.tecnico?' &bull; '+esc(e.tecnico):'')+'</span>'
        +'</div>'+body+'</div>';
    }).join("");
  }

  var totalCusto=0;
  if(o.execLog)o.execLog.forEach(function(e){if(e.tipo=="peca"&&e.custo)totalCusto+=e.qty*e.custo;});

  return '<button class="btn bx" style="margin-bottom:16px" onclick="voltar()">&#8592; Voltar</button>'
    +'<div style="margin-bottom:16px"><div class="os-numero-big">'+esc(o.numero_os||"")+'</div><div style="font-size:18px;font-weight:800;margin-bottom:8px">'+esc(o.titulo)+'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">'+bdg(o.status,SC)+bdg(o.prioridade,PC)+bdg(o.tipo,TC)+'</div>'
    +'<div class="status-flow">'+flow+'</div></div>'

    +'<div class="card">'
    +'<div class="card-title">Informacoes</div>'
    +[[t('ord_f_ativo_label'),o.ativo],[t('ord_f_tecnico'),o.tecnico||"--"],[t('ord_f_abertura'),o.abertura],[t('ord_f_prazo'),o.prazo||"--"]].map(function(f){return'<div class="detail-field"><div class="dk">'+f[0]+'</div><div class="dv">'+esc(f[1])+'</div></div>';}).join("")
    +(o.descricao?'<div class="detail-field"><div class="dk">Descricao / Sintoma</div><div class="dv" style="font-size:14px;color:#94a3b8;line-height:1.5">'+esc(o.descricao)+'</div></div>':"")
    +'</div>'

    +(execFormOpen&&o.status=="Em Andamento"&&podeExecutar?renderExecForm():'')

    +'<div class="card">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'
    +'<div class="card-title" style="margin-bottom:0">'+t('ord_reg_exec')+'</div>'
    +(totalCusto>0?'<span style="font-size:12px;color:#f59e0b;font-weight:700">R$ '+totalCusto.toLocaleString("pt-BR")+" em pecas</span>":"")
    +'</div>'
    +(logHtml||'<div style="color:#64748b;text-align:center;padding:20px;font-size:13px">'+(o.status=="Aberta"?t('ord_inicia_para_reg'):t('ord_sem_reg'))+'</div>')
    +'</div>'

    +'<div class="action-card">'+ac+'</div>';
}

function renderExecForm(){
  return '<div class="card" id="exec-form-card">'
    +'<div class="card-title">Registrar Execucao</div>'
    +'<div class="fg">'
    +'<label class="lbl">Tipo de Registro</label>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px">'
    +'<div class="os-type-btn selected" onclick="setExecTipo(\'observacao\',this)" style="padding:10px 6px">'
    +'<div class="os-type-icon" style="font-size:16px">&#128221;</div><div class="os-type-label">Observacao</div></div>'
    +'<div class="os-type-btn" onclick="setExecTipo(\'medicao\',this)" style="padding:10px 6px">'
    +'<div class="os-type-icon" style="font-size:16px">&#128207;</div><div class="os-type-label">Medicao</div></div>'
    +'<div class="os-type-btn" onclick="setExecTipo(\'peca\',this)" style="padding:10px 6px">'
    +'<div class="os-type-icon" style="font-size:16px">&#128295;</div><div class="os-type-label">Peca / Material</div></div>'
    +'<div class="os-type-btn" onclick="setExecTipo(\'foto\',this)" style="padding:10px 6px">'
    +'<div class="os-type-icon" style="font-size:16px">&#128248;</div><div class="os-type-label">Foto / Anexo</div></div>'
    +'</div>'
    +'<input type="hidden" id="exec-tipo" value="observacao"/>'
    +'</div>'
    +'<div class="fg"><label class="lbl">Data / Hora</label><input type="datetime-local" id="exec-data" value="'+nowLocalStr()+'"/></div>'
    +'<div class="fg"><label class="lbl">Tecnico</label><select id="exec-tec"><option value="">Selecione...</option><option>Joao Silva</option><option>Maria Santos</option><option>Carlos Pereira</option><option>Ana Lima</option><option>Pedro Oliveira</option></select></div>'

    +'<div id="exec-obs-fields">'
    +'<div class="fg"><label class="lbl">Descricao *</label><textarea id="exec-desc" placeholder="O que foi observado, feito ou encontrado..."></textarea></div>'
    +'</div>'

    +'<div id="exec-med-fields" style="display:none">'
    +'<div class="fg"><label class="lbl">Parametro medido</label><select id="exec-param"><option>Temperatura (°C)</option><option>Vibracao (mm/s)</option><option>Pressao (bar)</option><option>Corrente (A)</option><option>Tensao (V)</option><option>Ruido (dB)</option><option>Espessura (mm)</option><option>Rotacao (RPM)</option><option>Outro</option></select></div>'
    +'<div class="g2">'
    +'<div class="fg"><label class="lbl">Valor medido *</label><input type="number" id="exec-valor" step="0.01" placeholder="0.0"/></div>'
    +'<div class="fg"><label class="lbl">Limite / Referencia</label><input type="number" id="exec-limite" step="0.01" placeholder="0.0"/></div>'
    +'</div>'
    +'<div class="fg"><label class="lbl">Condicao</label><select id="exec-cond"><option>Normal</option><option>Atencao</option><option>Critico</option><option>Fora de especificacao</option></select></div>'
    +'<div class="fg"><label class="lbl">Observacao adicional</label><input id="exec-med-obs" placeholder="Contexto ou detalhe..."/></div>'
    +'</div>'

    +'<div id="exec-peca-fields" style="display:none">'
    +'<div class="fg"><label class="lbl">Descricao da Peca / Material *</label><input id="exec-peca-desc" placeholder="Ex: Rolamento SKF 6205"/></div>'
    +'<div class="g2">'
    +'<div class="fg"><label class="lbl">Quantidade</label><input type="number" id="exec-qty" value="1" min="1"/></div>'
    +'<div class="fg"><label class="lbl">Custo unitario (R$)</label><input type="number" id="exec-custo" min="0" placeholder="0.00"/></div>'
    +'</div>'
    +'<div class="fg"><label class="lbl">Observacao</label><input id="exec-peca-obs" placeholder="Codigo, fornecedor..."/></div>'
    +'</div>'

    +'<div id="exec-foto-fields" style="display:none">'
    +'<div class="fg"><label class="lbl">Descricao da foto</label><input id="exec-foto-desc" placeholder="O que a foto mostra..."/></div>'
    +'<div class="ua" onclick="document.getElementById(\'exec-foto-input\').click()" style="padding:20px">'
    +'<input type="file" id="exec-foto-input" accept="image/*" style="display:none" onchange="previewFoto(this)"/>'
    +'<div id="exec-foto-preview" style="font-size:22px;margin-bottom:6px">&#128247;</div>'
    +'<div style="font-size:13px;color:#94a3b8">Toque para selecionar imagem</div>'
    +'</div>'
    +'</div>'

    +'<div class="mf"><button class="btn bx" onclick="toggleExecForm()">Cancelar</button><button class="btn bp" onclick="saveExec()">Salvar Registro</button></div>'
    +'</div>';
}

// Popula seletor de perfil
(function(){
  var sel = document.getElementById("perfil-sel");
  _tecNomes.forEach(function(nome){
    var opt = document.createElement("option");
    opt.value = nome;
    opt.textContent = "⚒ " + nome;
    sel.appendChild(opt);
  });
})();

initApp(render);
</script>
<script>
